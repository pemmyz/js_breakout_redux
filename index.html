<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JavaScript Brick Breaker Game (with Planck.js Physics)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top bar replacing side-by-side layout for a tighter interface -->
    <div id="top-bar">
        <div class="top-buttons">
            <button id="mobile-btn">📱 Fullscreen</button>
            <button id="btnOptions">⚙️ Options / Controls</button>
        </div>
        <h1>JS Brick Breaker</h1>
    </div>

    <!-- Wrapping everything in game-container for scaling -->
    <div id="game-container">
        <div id="screen"> <!-- Represents fixed size resolution -->
            <div id="gameArea">
                <canvas id="gameCanvas"></canvas>
            </div>
            
            <!-- NEW MOBILE TOUCH CONTROLS OVERLAY -->
            <div id="mobile-controls">
                <div id="mobile-dpad">
                    <button id="mobile-left" class="mobile-control-btn">◀</button>
                    <button id="mobile-right" class="mobile-control-btn">▶</button>
                </div>
                <div id="mobile-action">
                    <button id="mobile-up" class="mobile-control-btn">A</button> <!-- Action / Auto-Follow -->
                </div>
            </div>
        </div>
    </div>

    <!-- Options Menu Modal -->
    <div id="optionsModal" class="modal hidden">
        <div class="modal-content controls-info">
            <span id="closeOptions" class="close-btn">&times;</span>
            <h2>Controls & Options</h2>
            <div class="gamepad-info">
                <p><strong>Gamepad Supported:</strong> Use Left Stick or D-Pad to move. 'A' toggles auto-follow, 'B' teleports, 'Start' for new game, LB/RB to change speed.</p>
            </div>
            <div class="button-controls-container">
                <div class="button-row">
                    <span class="control-description"><strong>Left/Right Arrows (or Tap Screen Sides):</strong> Move Paddle</span>
                </div>
                <div class="button-row">
                    <span class="control-description"><strong>Up/Down Arrows:</strong> Change Ball Speed</span>
                     <div class="action-buttons">
                        <button id="btnIncreaseSpeed" title="Increase Ball Speed (ArrowUp)">Increase Speed</button>
                        <button id="btnDecreaseSpeed" title="Decrease Ball Speed (ArrowDown)">Decrease Speed</button>
                    </div>
                </div>
                <div class="button-row">
                     <button id="btnToggleAutoFollow" title="Toggle Auto-Follow Paddle (A)"><strong>A:</strong> Toggle Auto-Follow Paddle</button>
                </div>
                <div class="button-row">
                    <button id="btnTeleportBall" title="Teleport Ball to Paddle (Space)"><strong>Space:</strong> Teleport Ball to Paddle</button>
                </div>
                <div class="button-row">
                     <button id="btnNewGame" title="New Game (N) - Retains Speed, Cumulates Score"><strong>N:</strong> New Game (Keep Score & Speed)</button>
                </div>
                <div class="button-row">
                     <button id="btnToggleTouch" title="Toggle Legacy Touch Controls (T)"><strong>T:</strong> Toggle Legacy Touch Mode</button>
                </div>
                <div class="button-row">
                    <button id="btnToggleHelp" title="Toggle Help Screen (H)"><strong>H:</strong> Toggle Help Screen</button>
                </div>
                <div class="button-row">
                    <button id="mute-button">Mute</button>
                </div>
            </div>
            <p id="autoFollowStatus">Auto-Follow: OFF</p>
        </div>
    </div>

    <!-- Include the Planck.js physics library -->
    <script src="planck.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
